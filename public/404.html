<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Posteena</title>
  </head>
  <body>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query
      // string into just a query string, and then redirects the browser
      // to the new url with only a query string and hash fragment,
      // e.g. http://www.foo.tld/one/two?a=b#anchor -> http://www.foo.tld/?/one/two&a=b#anchor
      // Note: the script works with both a custom domain and a github.io subdomain.
      // Also note: if the project is at http://username.github.io/repo-name/ then
      // the variable pathSegmentsToKeep should be set to 1, and it should be 0 otherwise.
      (function(l) {
        if (l.search[1] !== '/' ) {
          var pathSegmentsToKeep = 0;

          var l = window.location;
          l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
            l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
          );
        }
      }(window.location))
    </script>
  </body>
</html>
